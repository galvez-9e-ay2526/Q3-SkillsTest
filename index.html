<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 SKILLS TEST</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">CINE SOPHIA TICKETS</h1><hr>
        <h4>STUDENT DETAILS</h4>
        <label for="name">Full Name:</label>
        <input type="text" id="name" class="form-control mb-3" placeholder="Enter your name">
        <h4>TICKET SELECTION: </h4><br>
        <label for="quantity">QUANTITY: (₱250.00 each)</label>
        <input type="number" id="quantity" class="form-control mb-3" placeholder="Enter quantity"><br>
        
    <div class="container mt-4">
        <h4>PAYMENT DETAILS</h4>
<hr>

    <label>SUBTOTAL:</label>
        <input type="text" id="subtotal" class="form-control mb-3" readonly>

    <label>ADMIN FEE</label>
        <input type="text" id="adminfee" class="form-control mb-3" readonly>


    <label for="total"><b>TOTAL PRICE:</b></label>
        <input type="text" id="total"class="form-control mb-3" readonly><br>

    <button type="button" class="btn btn-primary" onclick="computeTotal()">Total</button>
    <button type="button" class="btn btn-primary" onclick="window.location.reload()">Reset</button>
    </div>

    </div>
    
    <script src="main.js"></script>
</body>
</html>
